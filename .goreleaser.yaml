version: 2

project_name: ldt

before:
  hooks:
    - go mod tidy

builds:
  - id: ldt
    main: .
    binary: ldt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ldt
    ids:
      - ldt
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: Longitudinal-Depression-Toolkit
    name: CLI

brews:
  - name: ldt
    repository:
      owner: Longitudinal-Depression-Toolkit
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Longitudinal-Depression-Toolkit/ldt-toolkit"
    description: "Interactive no-code terminal CLI for the Longitudinal Depression Trajectories toolkit."
    license: "MIT"
    install: |
      bin.install "ldt"
    test: |
      output = shell_output("#{bin}/ldt --help", 1)
      assert_match "interactive mode only", output

scoops:
  - name: ldt
    repository:
      owner: Longitudinal-Depression-Toolkit
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/Longitudinal-Depression-Toolkit/ldt-toolkit"
    description: "Interactive no-code terminal CLI for the Longitudinal Depression Trajectories toolkit."
    license: "MIT"
